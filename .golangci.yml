version: "2"
run:
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - gosec
    - revive
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - wsl
  settings:
    errcheck:
      exclude-functions:
        - (*net/http.Request).Body.Close
        - (net/http.ResponseWriter).Write
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
